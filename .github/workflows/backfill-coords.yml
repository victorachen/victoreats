name: Backfill missing coords

on:
  schedule:
    - cron: '0 12 * * *'   # 12:00 UTC daily (~5am Pacific)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  backfill:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run backfill
        run: python scripts/backfill_coords.py
      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [[ -n "$(git status --porcelain)" ]]; then
            git add content/posts/
            git commit -m "Backfill coords for posts missing lat/lng"
            git push
          else
            echo "No coord changes"
          fi
