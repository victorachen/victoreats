<style>
  /* ---- Tab Navigation ---- */
  .tab-nav {
    display: flex;
    gap: 0;
    border-bottom: 2px solid #e0e0e0;

    padding: 0.75rem 1.5rem;

    background: none;
    font-size: 1rem;
    font-weight: 600;
    color: #777;

    border-bottom: 3px solid transparent;

  .tab-btn:hover {
    color: #333;
  }
  .tab-btn.active {

  }

    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));

    background: #fff;

    width: 100%;
    height: 220px;
    object-fit: cover;
    display: block;
  }
  .card-body {
    padding: 1.25rem;
  }
  .card-title {
    font-size: 1.2rem;
    margin: 0 0 0.35rem 0;
    font-weight: 700;

  .card-title a {
    color: #222;
    text-decoration: none;
  }
  .card-title a:hover {
    color: #e25822;
  }
  .card-address {
    font-size: 0.85rem;
    color: #888;
    margin: 0 0 0.75rem 0;
  }
  .card-review {
    font-size: 0.95rem;
    line-height: 1.55;
    color: #444;
  }
  .card-review p {
    margin: 0 0 0.5rem 0;

  #map {
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);

  @media (max-width: 600px) {

      gap: 1rem;
